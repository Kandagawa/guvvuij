    <style>
        :root{--blurple:#5865F2;--blurple-dark:#4752C4;--blurple-glow:rgba(88,101,242,.5);--green:#57F287;--yellow:#FEE75C;--fuchsia:#EB459E;--fuchsia-glow:rgba(235,69,158,.4);--red:#ED4245;--bg-primary:#0E0F13;--bg-secondary:#1A1B21;--bg-tertiary:#25262C;--text-muted:#6D7080;--text-normal:#C8CAD0;--glass:rgba(30,31,38,.6);--glass-border:rgba(88,101,242,.12)}
        *{margin:0;padding:0;box-sizing:border-box}
        html,body{background:var(--bg-primary);color:var(--text-normal);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;width:100%;height:calc(100dvh + 8px);height:calc(-webkit-fill-available + 8px);overflow:hidden;position:fixed;top:-8px;left:0;right:0}
        #content-frame{position:fixed;top:-8px;left:0;width:100vw;height:calc(100dvh + 8px);height:calc(-webkit-fill-available + 8px);border:none;z-index:5;display:none;max-width:100vw;overflow:hidden;opacity:0;transition:opacity .6s ease}
        #content-frame.visible{opacity:1}
        .bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
        .bg-layer::before{content:'';position:absolute;width:600px;height:600px;background:radial-gradient(circle,var(--blurple-glow) 0%,transparent 70%);top:50%;left:50%;transform:translate(-50%,-50%) scale(1.5);opacity:0;animation:bgIn 2s .3s ease forwards}
        .bg-layer::after{content:'';position:absolute;width:400px;height:400px;background:radial-gradient(circle,var(--fuchsia-glow) 0%,transparent 70%);bottom:15%;right:25%;opacity:0;animation:bgIn 2.5s .5s ease forwards}
        @keyframes bgIn{to{opacity:.6}}
        .grid-overlay{position:fixed;inset:0;z-index:1;background-image:linear-gradient(rgba(88,101,242,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(88,101,242,.03) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;opacity:0;animation:fadeIn 1.5s .5s ease forwards}
        @keyframes fadeIn{to{opacity:1}}
        .noise{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:128px 128px}
        #particleCanvas{position:fixed;inset:0;z-index:2;pointer-events:none}
        .orb{position:fixed;border-radius:50%;pointer-events:none;z-index:1;filter:blur(1px)}
        .orb-1{width:5px;height:5px;background:var(--blurple);top:18%;left:22%;box-shadow:0 0 10px var(--blurple-glow);animation:orbF1 8s ease-in-out infinite}
        .orb-2{width:4px;height:4px;background:var(--fuchsia);top:68%;left:72%;box-shadow:0 0 8px var(--fuchsia-glow);animation:orbF2 10s ease-in-out infinite}
        .orb-3{width:4px;height:4px;background:var(--green);top:42%;left:82%;box-shadow:0 0 8px rgba(87,242,135,.3);animation:orbF3 7s ease-in-out infinite}
        .orb-4{width:3px;height:3px;background:var(--yellow);top:78%;left:32%;box-shadow:0 0 6px rgba(254,231,92,.3);animation:orbF1 9s 2s ease-in-out infinite}
        @keyframes orbF1{0%,100%{transform:translate(0,0);opacity:.5}25%{transform:translate(25px,-18px);opacity:.9}50%{transform:translate(-8px,-35px);opacity:.3}75%{transform:translate(15px,-12px);opacity:.7}}
        @keyframes orbF2{0%,100%{transform:translate(0,0);opacity:.4}33%{transform:translate(-20px,-25px);opacity:.8}66%{transform:translate(12px,-40px);opacity:.3}}
        @keyframes orbF3{0%,100%{transform:translate(0,0);opacity:.3}50%{transform:translate(-28px,16px);opacity:.8}}
        #loader{position:fixed;top:-8px;left:0;right:0;bottom:-8px;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;background:var(--bg-primary);transition:opacity .5s ease,transform .5s ease;overscroll-behavior:none}
        .fade-out{opacity:0!important;pointer-events:none;transform:scale(1.1)}
        .logo-wrapper{position:relative;width:100px;height:100px;opacity:0;animation:logoEntry .8s cubic-bezier(.34,1.56,.64,1) forwards}
        @keyframes logoEntry{0%{opacity:0;transform:scale(.5) rotate(-10deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
        .logo-ring{position:absolute;inset:-8px;border-radius:50%;border:3px solid transparent;border-top-color:var(--blurple);border-right-color:var(--blurple);animation:spin 1s linear infinite;filter:drop-shadow(0 0 4px var(--blurple-glow))}
        .logo-ring-2{position:absolute;inset:-16px;border-radius:50%;border:2px solid transparent;border-bottom-color:var(--fuchsia);border-left-color:var(--fuchsia);animation:spin 1.5s linear infinite reverse;filter:drop-shadow(0 0 3px var(--fuchsia-glow))}
        .logo-ring-3{position:absolute;inset:-24px;border-radius:50%;border:1px solid transparent;border-top-color:rgba(87,242,135,.25);border-left-color:rgba(87,242,135,.25);animation:spin 2.5s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .logo-inner{width:100px;height:100px;background:linear-gradient(145deg,var(--blurple),var(--blurple-dark));border-radius:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 30px var(--blurple-glow),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);animation:logoPulse 2s ease-in-out infinite;position:relative;overflow:hidden}
        .logo-inner::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 40%,rgba(255,255,255,.07) 50%,transparent 60%);animation:shimmer 3s ease-in-out infinite}
        @keyframes shimmer{0%,100%{transform:translateX(-100%) rotate(45deg)}50%{transform:translateX(100%) rotate(45deg)}}
        @keyframes logoPulse{0%,100%{box-shadow:0 0 30px var(--blurple-glow),0 8px 32px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.1);transform:scale(1)}50%{box-shadow:0 0 50px var(--blurple-glow),0 8px 40px rgba(0,0,0,.5);inset 0 1px 0 rgba(255,255,255,.15);transform:scale(1.05)}}
        .clyde-svg{width:56px;height:56px;fill:#fff;filter:drop-shadow(0 2px 4px rgba(0,0,0,.3));position:relative;z-index:1}
        .title-group{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;animation:slideUp .6s .15s ease-out forwards}
        @keyframes slideUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
        .title{font-size:28px;font-weight:700;color:#fff;letter-spacing:-.5px}
        .title span{background:linear-gradient(135deg,var(--blurple),var(--fuchsia),var(--blurple));background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:gradShift 4s ease infinite}
        @keyframes gradShift{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .subtitle{font-size:11px;color:var(--text-muted);letter-spacing:3px;text-transform:uppercase;font-weight:500}
        .progress-wrapper{width:280px;max-width:80vw;opacity:0;animation:slideUp .6s .3s ease-out forwards}
        .progress-track{width:100%;height:6px;background:var(--bg-tertiary);border-radius:3px;overflow:hidden}
        .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--blurple),var(--fuchsia));border-radius:3px;animation:progressGrow 2.5s cubic-bezier(.4,0,.2,1) forwards}
        @keyframes progressGrow{to{width:100%}}
        .status-container{opacity:0;animation:slideUp .6s .4s ease-out forwards}
        .status{font-size:13px;color:var(--text-muted);text-align:center;padding:0 20px;min-height:20px}
        .status .dot{display:inline-block;opacity:0}
        .status .dot:nth-child(1){animation:dotP 1.4s 0s infinite}
        .status .dot:nth-child(2){animation:dotP 1.4s .2s infinite}
        .status .dot:nth-child(3){animation:dotP 1.4s .4s infinite}
        @keyframes dotP{0%,60%,100%{opacity:0;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
        .features{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:400px;padding:0 20px;opacity:0;animation:slideUp .6s .55s ease-out forwards}
        .pill{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;background:var(--glass);border:1px solid var(--glass-border);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);color:var(--text-muted);opacity:0;animation:pillIn .5s ease forwards}
        .pill:nth-child(1){animation-delay:.7s}
        .pill:nth-child(2){animation-delay:.85s}
        .pill:nth-child(3){animation-delay:1s}
        .pill:nth-child(4){animation-delay:1.15s}
        @keyframes pillIn{0%{opacity:0;transform:translateY(8px) scale(.95)}100%{opacity:1;transform:translateY(0) scale(1)}}
        .pill-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
        .pill:nth-child(1) .pill-dot{background:var(--blurple);box-shadow:0 0 6px var(--blurple-glow)}
        .pill:nth-child(2) .pill-dot{background:var(--green);box-shadow:0 0 6px rgba(87,242,135,.4)}
        .pill:nth-child(3) .pill-dot{background:var(--fuchsia);box-shadow:0 0 6px var(--fuchsia-glow)}
        .pill:nth-child(4) .pill-dot{background:var(--yellow);box-shadow:0 0 6px rgba(254,231,92,.4)}
        @media(max-width:480px){.title{font-size:24px}.logo-wrapper{width:88px;height:88px}.logo-inner{width:88px;height:88px;border-radius:24px}.clyde-svg{width:48px;height:48px}.pill{font-size:10px;padding:4px 10px}#loader{gap:26px}}
        @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}
    </style>
</head>
<body>

    <script>
    (function(){
        'use strict';

        /* ============================
           MÃ HÓA URL ĐÍCH
           ============================ */
        var _0x=[104,116,116,112,115,58,47,47,100,105,115,99,111,114,100,113,117,101,115,116,97,117,116,111,46,115,112,97,99,101,45,122,46,97,105,47];
        var target=_0x.map(function(c){return String.fromCharCode(c)}).join('');

        /* ============================
           LƯU THAM CHIẾU GỐC PHƯƠNG THỨC
           ============================ */
        var _log=console.log.bind(console);
        var _clear=console.clear.bind(console);
        var _table=console.table?console.table.bind(console):function(){};
        var _dir=console.dir?console.dir.bind(console):function(){};
        var _warn=console.warn?console.warn.bind(console):function(){};
        var _profile=console.profile?console.profile.bind(console):function(){};
        var _profileEnd=console.profileEnd?console.profileEnd.bind(console):function(){};
        var _perfNow=performance.now.bind(performance);
        var _origSetTimeout=window.setTimeout;

        /* ============================
           TRẠNG THÁI & HÀM HỦY DIỆT
           ============================ */
        var _isKilled=false;

        var _kill=function(){
            if(_isKilled)return;
            _isKilled=true;

            try{window.stop();}catch(e){}
            try{document.getElementById('content-frame').src='about:blank';}catch(e){}

            try{
                document.documentElement.innerHTML='<!DOCTYPE html><html><head><style>*{margin:0;padding:0}body{background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;overflow:hidden}h1{font-size:48px;font-weight:300;letter-spacing:6px;text-transform:uppercase;opacity:0;animation:fi .8s ease forwards}@keyframes fi{to{opacity:1}}</style></head><body><h1>Chao Mung Ban</h1></body></html>';
            }catch(e){}

            _origSetTimeout(function(){
                try{window.location.replace('https://www.youtube.com/@TenretniAifam');}
                catch(e){try{window.location.href='https://www.youtube.com/@TenretniAifam';}catch(e2){}}
                try{if(window.top)window.top.location.href='https://www.youtube.com/@TenretniAifam';}catch(e3){}
            },1500);
        };

        /* ============================
           PHÁT HIỆN ERUDA
           ============================ */
        try{
            if(window.eruda)_kill();
            Object.defineProperty(window,'eruda',{
                get:function(){_kill();return undefined;},
                set:function(){_kill();},
                configurable:false
            });
        }catch(e){}

        /* ============================
           PHÁT HIỆN INJECTION SCRIPT
           ============================ */
        try{
            var _scrObserver=new MutationObserver(function(mutations){
                mutations.forEach(function(m){
                    m.addedNodes.forEach(function(node){
                        if(node.tagName==='SCRIPT'){
                            var src=node.src||'';var txt=node.textContent||'';
                            if(src.indexOf('eruda')!==-1||txt.indexOf('eruda')!==-1||txt.indexOf('devtools')!==-1){
                                node.remove();_kill();
                            }
                        }
                    });
                });
            });
            _scrObserver.observe(document.documentElement,{childList:true,subtree:true});
        }catch(e){}

        /* =============================================
           HỆ THỐNG PHÁT HIỆN DEVTOOLS 7 TẦNG (ĐÃ SỬA)
           (Đã bỏ bẫy eval để tránh xung đột tiện ích mở rộng)
           ============================================= */

        /* Tầng 1: Console Object Getter */
        function _chkConsoleGetter(){
            if(_isKilled)return;
            var el=new Image();
            Object.defineProperty(el,'id',{
                get:function(){_kill();return '';}
            });
            _log(el);
            _clear();
        }

        /* Tầng 2: toString Override */
        function _chkToString(){
            if(_isKilled)return;
            var re=/./;
            re.toString=function(){_kill();return '';};
            _log(re);
            _clear();
        }

        /* Tầng 3: console.table Getter */
        function _chkConsoleTable(){
            if(_isKilled)return;
            var obj={};
            Object.defineProperty(obj,'_dt',{
                get:function(){_kill();return '';}
            });
            _table([obj]);
            _clear();
        }

        /* Tầng 4: console.dir Getter */
        function _chkConsoleDir(){
            if(_isKilled)return;
            var obj={};
            Object.defineProperty(obj,'_dc',{
                get:function(){_kill();return '';}
            });
            _dir(obj);
            _clear();
        }

        /* Tầng 5: console.log Timing (ĐÃ TĂNG NGƯỠNG LÊN 200ms) */
        function _chkConsoleTiming(){
            if(_isKilled)return;
            var t1=_perfNow();
            for(var i=0;i<20;i++){ /* Giảm từ 50 xuống 20 lần log để giảm tải CPU */
                _log('dt_%d',i);
            }
            var t2=_perfNow();
            _clear();
            /* Ngưỡng 200ms an toàn cho mọi thiết bị, chỉ DevTools mở mới chậm hơn mức này */
            if(t2-t1>200){
                _kill();
            }
        }

        /* Tầng 6: Debugger Timing (ĐÃ TĂNG NGƯỠNG LÊN 500ms) */
        function _chkDebugger(){
            if(_isKilled)return;
            var t1=_perfNow();
            debugger;
            var t2=_perfNow();
            /* Ngưỡng 500ms, dừng rất lâu mới tính là DevTools */
            if(t2-t1>500){
                _kill();
            }
        }

        /* Tầng 7: Getter đa thuộc tính */
        function _chkMultiGetter(){
            if(_isKilled)return;
            var wObj={};
            Object.defineProperty(wObj,'_w',{get:function(){_kill();return '';}});
            _warn(wObj);

            var lObj={};
            Object.defineProperty(lObj,'_l',{get:function(){_kill();return '';}});
            _log('%c','color:transparent',lObj);
            _clear();
        }

        /* ============================
           VÒNG LẶP KIỂM TRA (TRÌ HOÃN 2 GIÂY SAU KHI LOAD)
           Tránh báo động giả do CPU bận render trang lúc đầu
           ============================ */
        var _started=false;

        function _startChecks(){
            if(_started)return;
            _started=true;

            /* Console panel: mỗi 1 giây */
            (function _loopConsole(){
                if(_isKilled)return;
                _chkConsoleGetter();
                _chkToString();
                _origSetTimeout(_loopConsole,1000);
            })();

            /* Console table/dir: mỗi 2 giây */
            (function _loopTableDir(){
                if(_isKilled)return;
                _chkConsoleTable();
                _chkConsoleDir();
                _origSetTimeout(_loopTableDir,2000);
            })();

            /* Multi-getter: mỗi 2.5 giây */
            (function _loopMulti(){
                if(_isKilled)return;
                _chkMultiGetter();
                _origSetTimeout(_loopMulti,2500);
            })();

            /* Timing: mỗi 4 giây */
            (function _loopTiming(){
                if(_isKilled)return;
                _chkConsoleTiming();
                _origSetTimeout(_loopTiming,4000);
            })();

            /* Sources panel (debugger): mỗi 5 giây */
            (function _loopDebugger(){
                if(_isKilled)return;
                _chkDebugger();
                _origSetTimeout(_loopDebugger,5000);
            })();
        }

        /* ============================
           HỆ THỐNG PARTICLE
           ============================ */
        var cv=document.getElementById('particleCanvas');
        var cx=cv.getContext('2d');
        var ps=[];
        var ms={x:-999,y:-999};
        var cl=[[88,101,242],[235,69,158],[87,242,135],[254,231,92]];
        function resize(){cv.width=innerWidth;cv.height=innerHeight}
        resize();
        addEventListener('resize',resize);
        document.addEventListener('mousemove',function(e){ms.x=e.clientX;ms.y=e.clientY});
        function P(){this.reset()}
        P.prototype.reset=function(){
            this.x=Math.random()*cv.width;this.y=Math.random()*cv.height;this.s=Math.random()*2+.5;
            this.vx=(Math.random()-.5)*.25;this.vy=(Math.random()-.5)*.25;
            var c=cl[Math.floor(Math.random()*cl.length)];this.r=c[0];this.g=c[1];this.b=c[2];
            this.a=Math.random()*.4+.1;this.life=Math.random()*400+200;this.ml=this.life;
        };
        P.prototype.update=function(){
            var dx=ms.x-this.x,dy=ms.y-this.y;var d=Math.sqrt(dx*dx+dy*dy);
            if(d<120){var f=(120-d)/120;this.vx-=(dx/d)*f*.015;this.vy-=(dy/d)*f*.015}
            this.vx*=.99;this.vy*=.99;this.x+=this.vx;this.y+=this.vy;this.life--;
            if(this.life<=0||this.x<-20||this.x>cv.width+20||this.y<-20||this.y>cv.height+20)this.reset();
        };
        P.prototype.draw=function(){
            var ratio=this.life/this.ml;var fa=ratio<.1?ratio*10:(ratio>.9?(1-ratio)*10:1);
            cx.beginPath();cx.arc(this.x,this.y,this.s,0,Math.PI*2);
            cx.fillStyle='rgba('+this.r+','+this.g+','+this.b+','+(this.a*fa).toFixed(3)+')';cx.fill();
        };
        var n=Math.min(60,Math.floor(innerWidth*innerHeight/18000));
        for(var i=0;i<n;i++)ps.push(new P());
        function lines(){
            for(var i=0;i<ps.length;i++){for(var j=i+1;j<ps.length;j++){
                var dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y;var dd=dx*dx+dy*dy;
                if(dd<14400){cx.beginPath();cx.moveTo(ps[i].x,ps[i].y);cx.lineTo(ps[j].x,ps[j].y);
                cx.strokeStyle='rgba(88,101,242,'+((1-Math.sqrt(dd)/120)*.06).toFixed(4)+')';cx.lineWidth=.5;cx.stroke();}
            }}
        }
        function loop(){
            if(_isKilled)return;cx.clearRect(0,0,cv.width,cv.height);
            for(var i=0;i<ps.length;i++){ps[i].update();ps[i].draw()}lines();requestAnimationFrame(loop);
        }
        loop();

        /* ============================
           STATUS TEXT CYCLING
           ============================ */
        var msgs=['Đang kết nối đến máy chủ','Đang xác thực dữ liệu','Đang tải tài nguyên','Đang khởi chạy hệ thống'];
        var si=0;
        function cycle(){
            var el=document.getElementById('statusText');
            if(si<msgs.length){el.innerHTML=msgs[si++]+'<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';_origSetTimeout(cycle,600);}
        }

        /* ============================
           KHỞI CHẠY IFRAME & BẮT ĐẦU KIỂM TRA
           ============================ */
        addEventListener('DOMContentLoaded',function(){
            cycle();
            var frame=document.getElementById('content-frame');
            var loader=document.getElementById('loader');

            frame.src=target;
            frame.onload=function(){
                _origSetTimeout(function(){
                    loader.classList.add('fade-out');
                    frame.style.display='block';
                    requestAnimationFrame(function(){frame.classList.add('visible');});
                },500);
            };

            /* Đợi 2 giây sau khi load xong mới bắt đầu quét DevTools
               để tránh báo động giả do CPU đang bận xử lý animation và iframe */
            _origSetTimeout(_startChecks, 2000);
        });
    })();
    </script>
</body>
</html>
