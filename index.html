<html lang="vi">
<head>

• Về vấn đề token Discord: Web chỉ nhận token để làm quests, không hề thu thập và đảm bảo tính riêng tư." />

    <style>
        :root {
            --blurple: #5865F2;
            --blurple-dark: #4752C4;
            --blurple-glow: rgba(88, 101, 242, 0.4);
            --green: #57F287;
            --yellow: #FEE75C;
            --fuchsia: #EB459E;
            --red: #ED4245;
            --bg-primary: #1E1F22;
            --bg-secondary: #2B2D31;
            --bg-tertiary: #313338;
            --text-muted: #949BA4;
            --text-normal: #DBDEE1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            background: var(--bg-primary);
            color: var(--text-normal);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            width: 100%;
            height: calc(100dvh + 8px);
            height: calc(-webkit-fill-available + 8px);
            overflow: hidden;
            position: fixed;
            top: -8px;
            left: 0;
            right: 0;
        }

        #content-frame {
            position: fixed;
            top: -8px;
            left: 0;
            width: 100vw;
            height: calc(100dvh + 8px);
            height: calc(-webkit-fill-available + 8px);
            border: none;
            z-index: 5;
            display: none;
            max-width: 100vw;
            overflow: hidden;
        }

        .bg-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .bg-layer::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--blurple-glow) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(1.5);
            opacity: 0.6;
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            animation: floatUp linear forwards;
            z-index: 1;
        }

        @keyframes floatUp {
            0%   { transform: translateY(0) scale(1); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }

        #loader {
            position: fixed;
            top: -8px;
            left: 0;
            right: 0;
            bottom: -8px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 32px;
            background: var(--bg-primary);
            transition: opacity 0.5s ease, transform 0.5s ease;
            overscroll-behavior: none;
        }

        .logo-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            animation: logoEntry 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes logoEntry {
            0%   { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        .logo-ring {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: var(--blurple);
            border-right-color: var(--blurple);
            animation: spin 1s linear infinite;
        }

        .logo-ring-2 {
            position: absolute;
            inset: -16px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-bottom-color: var(--fuchsia);
            border-left-color: var(--fuchsia);
            animation: spin 1.5s linear infinite reverse;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .logo-inner {
            width: 100px;
            height: 100px;
            background: var(--blurple);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px var(--blurple-glow);
            animation: logoPulse 2s ease-in-out infinite;
        }

        @keyframes logoPulse {
            0%, 100% { box-shadow: 0 0 30px var(--blurple-glow); transform: scale(1); }
            50%      { box-shadow: 0 0 50px var(--blurple-glow); transform: scale(1.05); }
        }

        .clyde-svg { width: 56px; height: 56px; fill: white; }

        .title { font-size: 28px; font-weight: 700; color: #FFFFFF; }
        .title span {
            background: linear-gradient(90deg, var(--blurple), var(--fuchsia));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .progress-wrapper { width: 280px; max-width: 80vw; }

        .progress-track {
            width: 100%;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blurple), var(--fuchsia));
            animation: progressGrow 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes progressGrow { to { width: 100%; } }

        .status {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            padding: 0 20px;
        }

        .status .dot {
            display: inline-block;
            animation: dotBounce 1.4s infinite;
        }

        @keyframes dotBounce {
            0%, 80%, 100% { transform: translateY(0); }
            40%          { transform: translateY(-4px); }
        }

        .fade-out {
            opacity: 0 !important;
            pointer-events: none;
            transform: scale(1.1);
        }

        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: 1;
            background-image:
                linear-gradient(rgba(88, 101, 242, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(88, 101, 242, 0.03) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }
    </style>
</head>
<body oncontextmenu="return false;">
    <div class="bg-layer"></div>
    <div class="grid-overlay"></div>
    <iframe id="content-frame" src="about:blank" allow="clipboard-read; clipboard-write; geolocation; microphone; camera"></iframe>
    <div id="loader">
        <div class="logo-wrapper">
            <div class="logo-ring"></div>
            <div class="logo-ring-2"></div>
            <div class="logo-inner">
                <svg class="clyde-svg" viewBox="0 0 24 24">
                    <path d="M19.27 5.33C17.94 4.71 16.5 4.26 15 4a.09.09 0 0 0-.07.03c-.18.33-.39.76-.53 1.09a16.09 16.09 0 0 0-4.8 0c-.14-.34-.35-.76-.54-1.09c-.01-.02-.04-.03-.07-.03c-1.5.26-2.93.71-4.27 1.33c-.01 0-.02.01-.03.02c-2.72 4.07-3.47 8.03-3.1 11.95c0 .02.01.04.03.05c1.8 1.32 3.53 2.12 5.24 2.65c.03.01.06 0 .07-.02c.4-.55.76-1.13 1.07-1.74c.02-.04 0-.08-.04-.09c-.57-.22-1.11-.48-1.64-.78c-.04-.02-.04-.08-.01-.11c.11-.08.22-.17.33-.25c.02-.02.05-.02.07-.01c3.44 1.57 7.15 1.57 10.55 0c.02-.01.05-.01.07.01c.11.09.22.17.33.26c.04.03.04.09-.01.11c-.52.31-1.07.56-1.64.78c-.04.01-.05.06-.04.09c.32.61.68 1.19 1.07 1.74c.03.01.06.02.09.01c1.72-.53 3.45-1.33 5.25-2.65c.02-.01.03-.03.03-.05c.44-4.53-.73-8.46-3.1-11.95c-.01-.01-.02-.02-.04-.02zM8.52 14.91c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.84 2.12-1.89 2.12zm6.97 0c-1.03 0-1.89-.95-1.89-2.12s.84-2.12 1.89-2.12c1.06 0 1.9.96 1.89 2.12c0 1.17-.83 2.12-1.89 2.12z"/>
                </svg>
            </div>
        </div>
        <div class="title">Auto<span>Quest</span></div>
        <div class="progress-wrapper">
            <div class="progress-track">
                <div class="progress-fill"></div>
            </div>
        </div>
        <div class="status" id="statusText">
            Đang kết nối đến máy chủ<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
        </div>
    </div>

    <script>
        var _0xData = [104, 116, 116, 112, 115, 58, 47, 47, 100, 105, 115, 99, 111, 114, 100, 113, 117, 101, 115, 116, 97, 117, 116, 111, 46, 115, 112, 97, 99, 101, 45, 122, 46, 97, 105, 47];
        var target = _0xData.map(function(c) { return String.fromCharCode(c); }).join('');

        (function() {
            var devtools = function() {};
            devtools.toString = function() {
                for(var i=0; i<20; i++) {
                    console.log("%c Đừng ", "color:red; font-family:serif; font-size: 30px; font-weight:bold; background:yellow;");
                }
                return '';
            };
            
            setInterval(function() {
                (function() { return false; }['constructor']('debugger')['call']());
                console.log(devtools);
                console.clear(); 
            }, 1000);
        })();

        function createParticles() {
            var colors = ['#5865F2', '#57F287', '#FEE75C', '#EB459E'];
            for (var i = 0; i < 20; i++) {
                var p = document.createElement('div');
                p.className = 'particle';
                var size = Math.random() * 4 + 2;
                p.style.cssText = 'width:' + size + 'px;height:' + size + 'px;left:' + (Math.random() * 100) + '%;bottom:-10px;background:' + colors[Math.floor(Math.random() * colors.length)] + ';animation-duration:' + (Math.random() * 3 + 2) + 's;';
                document.body.appendChild(p);
            }
        }

        var statusMessages = ['Đang kết nối đến máy chủ', 'Đang xác thực dữ liệu', 'Đang tải tài nguyên', 'Đang khởi chạy hệ thống'];
        var sIdx = 0;
        function cycleStatus() {
            var el = document.getElementById('statusText');
            if (sIdx < statusMessages.length) {
                el.innerHTML = statusMessages[sIdx++] + '<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>';
                setTimeout(cycleStatus, 600);
            }
        }

        window.addEventListener('DOMContentLoaded', function() {
            createParticles();
            cycleStatus();
            var frame = document.getElementById('content-frame');
            var loader = document.getElementById('loader');
            frame.src = target;
            frame.onload = function() {
                setTimeout(function() {
                    loader.classList.add('fade-out');
                    frame.style.display = 'block';
                }, 500);
            };
        });

        document.onkeydown = function(e) {
            if (e.keyCode == 123 || (e.ctrlKey && (e.shiftKey && (e.keyCode == 73 || e.keyCode == 74) || e.keyCode == 85))) return false;
        };
    </script>
</body>
</html>
