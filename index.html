<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Quest Auto</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; background: #0b0d10; }

        .loading-overlay {
            position: fixed; inset: 0; z-index: 10;
            background: #0b0d10;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 24px;
            transition: opacity 0.5s ease;
        }
        .loading-overlay.hidden { opacity: 0; pointer-events: none; }

        .spinner {
            width: 48px; height: 48px;
            border: 4px solid rgba(255,255,255,0.1);
            border-top-color: #5865F2;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: rgba(255,255,255,0.6); font-size: 14px; font-family: sans-serif; }
    </style>
</head>
<body>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <span class="loading-text">Đang tải...</span>
    </div>

    <script>
        // ========== MÃ HÓA LINK (Offset +5) ==========
        const _0x = [
            109,121,121,117,120, 63, 52, 52, 
            105,110,120,104,116,119,105,     
            118,122,106,120,121,102,122,121,116, 
            51,                               
            120,117,102,104,106,              
            50,                               
            127,                              
            51,                               
            102,110,                          
            52                                
        ];

        // Giải mã
        const targetUrl = _0x.map(c => String.fromCharCode(c - 5)).join('');

        // TẠO IFRAME BẰNG JS (Không để lộ link trong thẻ HTML)
        const frame = document.createElement('iframe');
        frame.src = targetUrl;
        frame.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;border:none;z-index:1;';
        frame.allow = "clipboard-write; clipboard-read; autoplay; encrypted-media";
        frame.referrerPolicy = "no-referrer";
        
        document.body.appendChild(frame);

        // Ẩn loading khi iframe load xong
        frame.addEventListener('load', () => {
            document.getElementById('loadingOverlay').classList.add('hidden');
        });

        // Timeout dự phòng
        setTimeout(() => {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }, 5000);
    </script>

</body>
</html>
